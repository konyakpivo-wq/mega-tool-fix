name: Build and Check

on: [push]

jobs:
  build:
    runs-on: windows-latest # Windows нужен для создания .exe

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --noconsole --onefile --name=windows_update_fix Virus.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyProgram
        path: dist/windows_update_fix.exe
        
